{% extends "layouts/base.html" %}

{% block content %}
<div x-data="pipelinePage()">
  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card">
        <div class="card-header">Pipeline Run</div>
        <div class="card-body">
          <form @submit.prevent="runPipeline()">
            <div class="mb-3">
              <label class="form-label">Profile</label>
              <select class="form-select" x-model="profile">
                <option value="kyc">kyc</option>
                <option value="access_control">access_control</option>
                <option value="search">search</option>
                <option value="attendance">attendance</option>
                <option value="enrollment">enrollment</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Image</label>
              <input type="file" class="form-control" accept="image/*" @change="onImageSelected($event)" required>
            </div>
            <button class="btn btn-primary w-100" type="submit" :disabled="!selectedFile">Execute Pipeline</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-8" x-show="stages.length" x-cloak>
      <div class="card">
        <div class="card-header">Stage Timeline</div>
        <div class="card-body">
          <template x-for="(stage, index) in stages" :key="stage.name">
            <div class="pipeline-stage card mb-3">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                  <div>
                    <div class="fw-semibold" x-text="stage.label"></div>
                    <div class="small text-secondary" x-text="stage.name"></div>
                  </div>
                  <div class="text-end">
                    <span class="badge" :class="stage.status === 'completed' ? 'text-bg-success' : 'text-bg-secondary'"
                          x-text="stage.status"></span>
                    <div class="small mt-1" x-text="`${stage.timeMs.toFixed(1)} ms`"></div>
                  </div>
                </div>
                <button class="btn btn-sm btn-outline-light mt-3" type="button"
                        @click="stage.expanded = !stage.expanded">
                  Details
                </button>
                <div class="mt-3 small" x-show="stage.expanded" x-cloak>
                  <pre class="code-block" x-text="stage.details"></pre>
                </div>
              </div>
            </div>
            <div class="pipeline-arrow text-center text-secondary mb-3" x-show="index < stages.length - 1">↓</div>
          </template>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
