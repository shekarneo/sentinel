<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} · Sentinel Console</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/console.css" rel="stylesheet">
  <script defer src="/static/js/console.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
  <script defer src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body x-data="consoleApp()" x-init="init()">
  {% include "partials/loading_overlay.html" %}
  {% include "partials/toast_container.html" %}

  <div class="app-shell d-flex">
    {% include "partials/sidebar.html" %}

    <div class="app-main flex-grow-1">
      {% include "partials/header.html" %}
      <main class="container-fluid py-4 px-4">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
