<header class="app-header border-bottom px-4 py-3 d-flex align-items-center justify-content-between">
  <div>
    <h1 class="h4 mb-0">{{ title }}</h1>
    <p class="text-secondary small mb-0">Sentinel Biometric Management Console</p>
  </div>
  <div class="d-flex align-items-center gap-2">
    <span class="badge text-bg-success" x-show="$store.console.healthStatus === 'ok'" x-cloak>System Healthy</span>
    <span class="badge text-bg-warning" x-show="$store.console.healthStatus !== 'ok'" x-cloak>Checking...</span>
  </div>
</header>
